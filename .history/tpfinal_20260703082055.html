<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curso de JavaScript Avanzado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!--nueva tarea-->
    <div class="container mt-3 mb-3">
    <h4>Nueva tarea</h4>

    <div class="input-group">
        <input
            type="text"
            id="nuevaTarea"
            class="form-control"
            placeholder="Escribe una nueva tarea...">

        <button
            class="btn btn-primary"
            id="btnAgregar">
            Agregar
        </button>
    </div>
</div>

<ul class="list-group" id="listaTareas">

    <!-- Tus módulos -->

</ul>

<div class="container mt-5">
    <div class="d-flex justify-content-end gap-2 mb-3">
        <button id="aumentar" class="btn btn-secondary btn-sm">A+</button>
        <button id="disminuir" class="btn btn-secondary btn-sm">A-</button>
        <button id="tema" class="btn btn-dark btn-sm">Cambiar tema</button>
    </div>

    <div class="card shadow" id="mainCard">
        <div class="card-header bg-primary text-white" id="cardHeader">
            <h3 class="mb-0">Curso de JavaScript Avanzado</h3>
        </div>

        <div class="card-body">
            <ul class="list-group">

                <li class="list-group-item d-flex justify-content-between align-items-center">
                    <div>
                        <input class="form-check-input me-2 item-check" type="checkbox" id="mod1" checked>
                        <label for="mod1">Módulo 1: Introducción a JavaScript</label>
                    </div>
                </li>

                <li class="list-group-item d-flex justify-content-between align-items-center">
                    <div>
                        <input class="form-check-input me-2 item-check" type="checkbox" id="mod2">
                        <label for="mod2">Módulo 2: Operadores y Arreglos</label>
                    </div>
                </li>

                <li class="list-group-item d-flex justify-content-between align-items-center">
                    <div>
                        <input class="form-check-input me-2 item-check" type="checkbox" id="mod3">
                        <label for="mod3">Módulo 3: Condicionales y Funciones</label>
                    </div>
                </li>

                <li class="list-group-item d-flex justify-content-between align-items-center">
                    <div>
                        <input class="form-check-input me-2 item-check" type="checkbox" id="mod4" checked>
                        <label for="mod4">Módulo 4: Validación de Formularios y Accesibilidad</label>
                    </div>
                </li>

                <li class="list-group-item d-flex justify-content-between align-items-center">
                    <div>
                        <input class="form-check-input me-2 item-check" type="checkbox" id="mod5" checked>
                        <label for="mod5">Módulo 5: Introducción al DOM</label>
                    </div>
                </li>

                <li class="list-group-item d-flex justify-content-between align-items-center">
                    <div>
                        <input class="form-check-input me-2 item-check" type="checkbox" id="mod6" checked>
                        <label for="mod6">Módulo 6: Introducción a las librerías de JavaScript</label>
                    </div>
                </li>

                <li class="list-group-item d-flex justify-content-between align-items-center">
                    <div>
                        <input class="form-check-input me-2 item-check" type="checkbox" id="mod7" checked>
                        <label for="mod7">Módulo 7: Repaso y Ejemplos</label>
                    </div>
                </li>

                <li class="list-group-item d-flex justify-content-between align-items-center">
                    <div>
                        <input class="form-check-input me-2 item-check" type="checkbox" id="mod8" checked>
                        <label for="mod8">Módulo 8: Git y GitHub</label>
                    </div>
                </li>

                <li class="list-group-item d-flex justify-content-between align-items-center">
                    <div>
                        <input class="form-check-input me-2 item-check" type="checkbox" id="mod9" checked>
                        <label for="mod9">Módulo 9: Entrega y Defensa del Trabajo Final</label>
                    </div>
                </li>

                <li class="list-group-item d-flex justify-content-between align-items-center">
                    <div class="form-check form-switch m-0">
                        <input class="form-check-input item-check" type="checkbox" id="checkNativeSwitch">
                        <label class="form-check-label" for="checkNativeSwitch">Trabajo Final Realizado</label>
                    </div>
                </li>

            </ul>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="script.js"></script>

</body>
</html>
