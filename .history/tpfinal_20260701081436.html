<!DOCTYPE html><html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist de tareas</title><!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light"><div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h3 class="mb-0">Checklist de tareas</h3>
        </div>

        <div class="card-body">
            <ul class="list-group">

                <!-- Tarea realizada -->
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    <div>
                        <input class="form-check-input me-2" type="checkbox" checked>
                        <span class="text-decoration-line-through">Diseñar la base de datos</span>
                    </div>
                    <span class="badge bg-success">Realizada</span>
                </li>

                <!-- Tarea en proceso -->
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    <div>
                        <input class="form-check-input me-2" type="checkbox">
                        <span>Crear formulario de carga</span>
                    </div>
                    <span class="badge bg-warning text-dark">En proceso</span>
                </li>

                <!-- Tarea pendiente -->
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    <div>
                        <input class="form-check-input me-2" type="checkbox">
                        <span>Generar reporte final</span>
                    </div>
                    <span class="badge bg-danger">Pendiente</span>
                </li>

            </ul>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
